<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock,Paper, Scissors</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>

</head>

<body>
    <main>
        <header class="main-header">
            <h2 class="game-title">Let's Play!</h2>
        </header>
        <section class="score-board">
            <h4>Player score: <span>0</span></h4>
            <h4>Computer score: <span>0</span></h4>
        </section>
        <section class="result-display">
            <h1 id="player-result" class="player-result">✊🏼</h1>
            <h1 class="versus-text">VS</h1>
            <h1 id="cpu-result" class="cpu-result">✊🏼</h1>
        </section>
        <section>
            <div class="options-choice">
                <div class="option-wrapper">
                    <button class="choice-btn" value="rock">✊🏼</button>
                    <h3 class="choice-label">Rock</h3>
                </div>
                <div class="option-wrapper">
                    <button class="choice-btn" value="paper">✋🏼</button>
                    <h3 class="choice-label">Paper</h3>
                </div>
                <div class="option-wrapper">
                    <button class="choice-btn" value="scissors">✌🏼</button>
                    <h3 class="choice-label">Scissors</h3>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
