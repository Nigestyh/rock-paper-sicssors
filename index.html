<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock,Paper, Scissors</title>
</head>

<body>
    <header>
        <h2>Let's Play!</h2>
    </header>
    <section>
        <h4>Player score:<span>0</span></h4>
        <h4>Computer score:<span>0</span></h4>
    </section>
    <section>
        <h1>✊🏼</h1>
        <h1>VS</h1>
        <h1>✊🏼</h1>
    </section>
    <section>
        <button>✊🏼</button>
        <h3>Rock</h3>
        <button>✋🏼</button>
        <h3>Paper</h3>
        <button>✌🏼</button>
        <h3>Scissors</h3>
    </section>
</body>

</html>
